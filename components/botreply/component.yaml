apiVersion: kdeps.io/v1
kind: Component
metadata:
  name: botreply
  description: Telegram bot reply via HTTP API
  version: "1.0.0"
interface:
  inputs:
    - name: token
      type: string
      required: true
      description: Telegram bot token
    - name: chatId
      type: string
      required: true
      description: Telegram chat ID to reply to
    - name: text
      type: string
      required: true
      description: Message text to send
resources:
  - name: Send Message
    actionId: send-message
    httpClient:
      url: "https://api.telegram.org/bot{{ get('botreply.token') }}/sendMessage"
      method: POST
      headers:
        Content-Type: application/json
      data: '{"chat_id":"{{ get(''botreply.chatId'') }}","text":"{{ get(''botreply.text'') }}"}'
