apiVersion: kdeps.io/v1
kind: Component
metadata:
  name: tts
  description: Text-to-speech synthesis (offline via espeak, online via OpenAI)
  version: "1.0.0"
setup:
  osPackages:
    - espeak
interface:
  inputs:
    - name: text
      type: string
      required: true
      description: Text to convert to speech
    - name: voice
      type: string
      required: false
      default: alloy
      description: Voice to use for OpenAI TTS (alloy, echo, fable, onyx, nova, shimmer)
    - name: apiKey
      type: string
      required: false
      description: OpenAI API key (required for speak-online resource)
resources:
  - name: Speak Offline
    actionId: speak-offline
    exec:
      command: "espeak '{{ get('tts.text') }}'"
  - name: Speak Online
    actionId: speak-online
    httpClient:
      url: "https://api.openai.com/v1/audio/speech"
      method: POST
      headers:
        Authorization: "Bearer {{ get('tts.apiKey') }}"
        Content-Type: application/json
      data: '{"model":"tts-1","input":"{{ get(''tts.text'') }}","voice":"{{ get(''tts.voice'', ''alloy'') }}"}'
