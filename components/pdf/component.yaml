apiVersion: kdeps.io/v1
kind: Component
metadata:
  name: pdf
  description: Generate PDF via Python pdfkit
  version: "1.0.0"
setup:
  pythonPackages:
    - pdfkit
  osPackages:
    - wkhtmltopdf
interface:
  inputs:
    - name: content
      type: string
      required: true
      description: HTML or plain text content to convert to PDF
    - name: outputFile
      type: string
      required: false
      default: /tmp/output.pdf
      description: Path to write the generated PDF
resources:
  - name: Generate Pdf
    actionId: generate-pdf
    python:
      script: |
        import pdfkit
        content = "{{ get('pdf.content') }}"
        output_file = "{{ get('pdf.outputFile', '/tmp/output.pdf') }}"
        pdfkit.from_string(content, output_file)
    response:
      data:
        generated: "{{ get('pdf.outputFile', '/tmp/output.pdf') }}"
