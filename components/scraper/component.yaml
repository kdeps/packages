apiVersion: kdeps.io/v1
kind: Component
metadata:
  name: scraper
  description: Web scraper using Python requests and BeautifulSoup
  version: "1.0.0"
setup:
  pythonPackages:
    - requests
    - beautifulsoup4
interface:
  inputs:
    - name: url
      type: string
      required: true
      description: URL to scrape
    - name: selector
      type: string
      required: false
      description: CSS selector to extract (defaults to full page text)
    - name: timeout
      type: integer
      required: false
      default: 30
      description: Request timeout in seconds
resources:
  - name: Scrape Url
    actionId: scrape-url
    python:
      script: |
        import requests, json
        from bs4 import BeautifulSoup
        url = "{{ get('scraper.url') }}"
        selector = "{{ get('scraper.selector', '') }}"
        timeout = int("{{ get('scraper.timeout', '30') }}")
        resp = requests.get(url, timeout=timeout)
        resp.raise_for_status()
        ct = resp.headers.get("content-type", "text/html").lower()
        if "html" in ct:
            soup = BeautifulSoup(resp.text, "html.parser")
            if selector:
                elements = soup.select(selector)
                content = "\n".join(e.get_text(strip=True) for e in elements)
            else:
                content = soup.get_text(separator="\n", strip=True)
        else:
            content = resp.text
        print(json.dumps({"content": content, "url": url, "status": resp.status_code}))
